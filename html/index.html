<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sm_loadingscreen · Lost MC</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- External CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- YOUTUBE VIDEO BACKGROUND -->
    <div class="video-bg">
        <iframe 
            src="https://www.youtube.com/embed/krLTxD-h-S8?autoplay=1&mute=0&loop=1&playlist=krLTxD-h-S8&controls=0&showinfo=0&rel=0&modestbranding=1&iv_load_policy=3&disablekb=1"
            allow="autoplay; encrypted-media; fullscreen"
            allowfullscreen
            frameborder="0">
        </iframe>
    </div>

    <!-- overlay for readability -->
    <div class="overlay"></div>

    <!-- MAIN UI -->
    <div class="loading-wrapper">
        <!-- LEFT: LOGO & BRAND -->
        <div class="brand-left">
            <div class="server-logo">
                <!-- REPLACE with your own logo: assets/images/logo.png -->
                <img src="assets/images/logo.png" alt="Server Logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 100%22%3E%3Crect width=%22200%22 height=%22100%22 fill=%22%231a120b%22 rx=%2212%22/%3E%3Ctext x=%2220%22 y=%2260%22 font-family=%22Impact%22 font-size=%2238%22 fill=%22%23d4af37%22 letter-spacing=%226%22%3ELOST MC%3C/text%3E%3Ctext x=%2220%22 y=%2285%22 font-family=%22monospace%22 font-size=%2214%22 fill=%22%23997b4c%22%3EMOTOR %26 PARA%3C/text%3E%3C/svg%3E'">
            </div>
            <div class="logo-text">LOST MC</div>
            <div class="server-name">YOUR SERVER NAME</div>
            <div class="sub-motto"><i class="fas fa-motorcycle"></i> SERT KARDEŞLİK <i class="fas fa-motorcycle"></i></div>
        </div>

        <!-- RIGHT: LOADING INFO -->
        <div class="info-right">
            <div class="quote-block">
                <div class="quote-text">
                    <i class="fas fa-quote-left"></i> 
                    Kısa haberdar teş yayınlama. Bıçakta biz olayın kardeşliğimizin adını ödelemesine asla için vermem. Bunu yapan bulduğumda kafasını motorumla eşlem!
                    <i class="fas fa-quote-right"></i>
                </div>
                <div class="quote-author">— Jones Lost</div>
            </div>

            <!-- LOADING PROGRESS -->
            <div class="loading-section">
                <div class="loading-label">
                    <span><i class="fas fa-circle" style="color: #d4af37; font-size: 0.6rem;"></i> YÜKLENİYOR</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-track">
                    <div id="loadingBar" class="progress-fill" style="width: 0%;"></div>
                </div>
                <div class="status-text" id="statusMessage">
                    <i class="fas fa-spinner fa-pulse"></i> MOTOR ÇALIŞIYOR...
                </div>
            </div>

            <div class="stamp">
                <i class="fas fa-skull"></i> THE LOST MC · 2026
            </div>
        </div>
    </div>

    <!-- External JavaScript -->
    <script src="js/loading.js"></script>
</body>
</html>
